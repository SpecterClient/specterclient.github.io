<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpecterClient | Полноценный контроль</title>
    <!-- Подключаем библиотеку EmailJS для отправки писем с кодом -->
    <script type="text/javascript" src="https://jsdelivr.net"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        
        body { 
            background: url('bg.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #fff; 
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, rgba(6, 6, 8, 0.8) 0%, rgba(6, 6, 8, 0.1) 50%, rgba(6, 6, 8, 0.8) 100%),
                        linear-gradient(180deg, rgba(6, 6, 8, 0.3) 0%, rgba(6, 6, 8, 0.6) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* Шапка сайта */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: rgba(6, 6, 8, 0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 10;
        }
        .logo { font-weight: 800; font-size: 1.4rem; letter-spacing: 1.5px; background: linear-gradient(45deg, #fff, #b5b5c3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo span { background: #a020f0; -webkit-text-fill-color: #fff; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; margin-left: 8px; vertical-align: middle; box-shadow: 0 0 10px rgba(160,32,240,0.5); }
        .nav-right { display: flex; align-items: center; gap: 25px; }
        .nav-link { color: #b5b5c3; text-decoration: none; font-size: 0.95rem; font-weight: 500; transition: 0.3s; }
        .nav-link:hover { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        
        .btn-auth { background: #a020f0; color: #fff; padding: 10px 22px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 0.95rem; box-shadow: 0 0 20px rgba(160,32,240,0.5); transition: 0.3s; border: none; cursor: pointer; }
        .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(160, 32, 240, 0.8); }

        /* Главный контейнер */
        .main-container {
            max-width: 1400px;
            margin: 10% auto 0 auto;
            padding: 0 60px;
            position: relative;
            z-index: 10;
        }

        .info-block { max-width: 540px; background: rgba(6, 6, 8, 0.45); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.03); backdrop-filter: blur(6px); }
        .info-block h2 { font-size: 3.5rem; margin-bottom: 20px; font-weight: 800; letter-spacing: 1px; }
        .info-block p { color: #cdcdde; line-height: 1.7; margin-bottom: 35px; font-size: 1.1rem; }
        
        .btn-group { display: flex; gap: 15px; }
        .btn-buy { background: #a020f0; color: #fff; padding: 14px 35px; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 1.05rem; box-shadow: 0 0 25px rgba(160,32,240,0.5); transition: 0.3s; }
        .btn-buy:hover { transform: translateY(-3px); box-shadow: 0 0 35px rgba(160,32,240,0.8); }
        .btn-more { background: rgba(255,255,255,0.03); color: #fff; padding: 14px 35px; border-radius: 10px; text-decoration: none; font-weight: 500; font-size: 1.05rem; border: 1px solid rgba(255,255,255,0.08); transition: 0.3s; backdrop-filter: blur(5px); }
        .btn-more:hover { background: rgba(255,255,255,0.08); transform: translateY(-2px); }

        /* --- СТИЛИ ДЛЯ ОКНА АВТОРИЗАЦИИ --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 4, 6, 0.75);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
        }
        
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-window {
            background: rgba(14, 14, 20, 0.95);
            border: 1px solid rgba(160, 32, 240, 0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(160, 32, 240, 0.2);
            position: relative;
            transform: scale(0.9);
            transition: 0.3s ease;
        }

        .modal-overlay.active .modal-window { transform: scale(1); }
        .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #a1a1aa; font-size: 1.5rem; cursor: pointer; transition: 0.2s; }
        .modal-close:hover { color: #fff; }

        .modal-window h3 {
            font-size: 1.8rem; font-weight: 700; margin-bottom: 25px; text-align: center;
            background: linear-gradient(45deg, #fff, #b5b5c3); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: #a1a1aa; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-group input {
            width: 100%; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 16px; border-radius: 10px; color: #fff; font-size: 1rem;
            transition: 0.3s; outline: none;
        }
        .input-group input:focus { border-color: #a020f0; background: rgba(160, 32, 240, 0.02); box-shadow: 0 0 15px rgba(160, 32, 240, 0.2); }

        .code-input-field { text-align: center; font-size: 1.5rem !important; letter-spacing: 8px; font-weight: 700; }

        .btn-submit {
            width: 100%; background: #a020f0; color: #fff; padding: 14px; border-radius: 10px;
            font-weight: 600; font-size: 1rem; border: none; cursor: pointer;
            box-shadow: 0 0 20px rgba(160, 32, 240, 0.4); transition: 0.3s; margin-top: 10px;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(160, 32, 240, 0.6); }

        .modal-footer { text-align: center; margin-top: 20px; color: #71717a; font-size: 0.9rem; }
        .modal-footer a { color: #a020f0; text-decoration: none; font-weight: 500; }
        .modal-footer a:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            .main-container { text-align: center; margin-top: 20%; padding: 0 20px; }
            .info-block { margin: 0 auto; padding: 25px; }
            .info-block h2 { font-size: 2.8rem; }
            .btn-group { justify-content: center; }
            .modal-window { max-width: 90%; }
        }
    </style>
</head>
<body>

    <!-- Шапка сайта -->
    <header>
        <div class="logo">SPECTER <span>1.16.5</span></div>
        <div class="nav-right">
            <a href="#" class="nav-link">Русский ▾</a>
            <a href="https://t.me" target="_blank" class="nav-link">Поддержка</a>
            <a href="#" class="nav-link">Купить</a>
            <button class="btn-auth" id="openAuthBtn">Авторизация</button>
        </div>
    </header>

    <!-- Главный блок -->
    <div class="main-container">
        <div class="info-block">
            <h2>О нас</h2>
            <p>Мы предоставляем вам лучший client для комфортной игры, который даст вам наилучшие впечатления от игры на любых серверах и анархиях.</p>
            <div class="btn-group">
                <a href="#" class="btn-buy">🛒 Купить</a>
                <a href="#" class="btn-more">Подробнее ➔</a>
            </div>
        </div>
    </div>

    <!-- ОКНО АВТОРИЗАЦИИ -->
    <div class="modal-overlay" id="authModal">
        <div class="modal-window">
            <button class="modal-close" id="closeAuthBtn">&times;</button>
            <h3 id="modalTitle">Вход в аккаунт</h3>
            
            <!-- ШАГ 1: Ввод Почты -->
            <form id="loginForm">
                <div class="input-group">
                    <label>Электронная почта (Email)</label>
                    <input type="email" id="userEmail" placeholder="example@mail.ru" required>
                </div>
                
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-submit">Получить код</button>
            </form>

            <!-- ШАГ 2: Ввод проверочного кода -->
            <form id="codeForm" style="display: none;">
                <div class="input-group">
                    <label style="text-align: center;">Код отправлен на вашу почту</label>
                    <input type="text" id="verificationCode" class="code-input-field" maxlength="4" placeholder="0000" required>
                </div>
                
                <button type="submit" class="btn-submit">Подтвердить вход</button>
            </form>
            
            <div class="modal-footer" id="modalFooter">
                Нет аккаунта? <a href="#" onclick="alert('Регистрация временно недоступна');">Создать аккаунт</a>
            </div>
        </div>
    </div>

    <script>
        // Инициализация EmailJS
        // Вставь свой Public Ключ вместо "YOUR_PUBLIC_KEY" (из вкладки Account на EmailJS)
        emailjs.init("YOUR_PUBLIC_KEY");
                
        // Вставь ID созданного шаблона вместо "YOUR_TEMPLATE_ID"
        const templateID = "YOUR_TEMPLATE_ID";

        const modal = document.getElementById('authModal');
        const openBtn = document.getElementById('openAuthBtn');
        const closeBtn = document.getElementById('closeAuthBtn');
        
        const loginForm = document.getElementById('loginForm');
        const codeForm = document.getElementById('codeForm');
        const modalTitle = document.getElementById('modalTitle');
        const modalFooter = document.getElementById('modalFooter');
        
        let generatedCode = null;

        openBtn.addEventListener('click', () => { modal.classList.add('active'); resetForms(); });
        closeBtn.addEventListener('click', () => modal.classList.remove('active'));
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });

        function resetForms() {
            loginForm.style.display = 'block';
            codeForm.style.display = 'none';
            modalTitle.innerText = 'Вход в аккаунт';
            modalFooter.style.display = 'block';
        }

        // Шаг 1: Генерация кода и отправка на почту
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('userEmail').value;
            
            generatedCode = Math.floor(1000 + Math.random() * 9000).toString();
            console.log("Сгенерированный код для теста:", generatedCode);

            const templateParams = {
                to_email: email,
                code: generatedCode
            };

            emailjs.send('service_2fwycnk', templateID, templateParams)
                .then(function() {
                    alert('Код успешно отправлен на почту!');
                    switchToCodeStep();
                }, function(error) {
                    alert('Переключили на ввод кода! (Код для теста без ключей можно подсмотреть в консоли F12)');
                    switchToCodeStep();
                });
        });

        function switchToCodeStep() {
            loginForm.style.display = 'none';
            codeForm.style.display = 'block';
            modalTitle.innerText = 'Проверка почты';
            modalFooter.style.display = 'none';
        }

        // Шаг 2: Проверка кода
        codeForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const userEnteredCode = document.getElementById('verificationCode').value;

            if (userEnteredCode === generatedCode) {
                alert('Авторизация успешно пройдена!');
                modal.classList.remove('active');
            } else {
                alert('Неверный код! Попробуйте еще раз.');
                document.getElementById('verificationCode').value = '';
            }
        });
    </script>

</body>
</html>
