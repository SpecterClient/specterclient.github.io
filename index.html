<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpecterClient | Полноценный контроль</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; scroll-behavior: smooth; }
        
        body { 
            background: #09090e;
            color: #fff; 
            overflow-x: hidden;
        }

        /* Первый экран (Главный блок) */
        .hero-section {
            min-height: 100vh;
            background: url('bg.jpg') no-repeat center center fixed; 
            background-size: cover;
            position: relative;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, rgba(6, 6, 8, 0.8) 0%, rgba(6, 6, 8, 0.1) 50%, rgba(6, 6, 8, 0.8) 100%),
                        linear-gradient(180deg, rgba(6, 6, 8, 0.3) 0%, rgba(6, 6, 8, 0.95) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* Шапка сайта */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: rgba(6, 6, 8, 0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 10;
        }
        .logo { font-weight: 800; font-size: 1.4rem; letter-spacing: 1.5px; background: linear-gradient(45deg, #fff, #b5b5c3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo span { background: #a020f0; -webkit-text-fill-color: #fff; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; margin-left: 8px; vertical-align: middle; box-shadow: 0 0 10px rgba(160,32,240,0.5); }
        .nav-right { display: flex; align-items: center; gap: 25px; }
        .nav-link { color: #b5b5c3; text-decoration: none; font-size: 0.95rem; font-weight: 500; transition: 0.3s; }
        .nav-link:hover { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .btn-auth { background: #a020f0; color: #fff; padding: 10px 22px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 0.95rem; box-shadow: 0 0 20px rgba(160,32,240,0.5); transition: 0.3s; }
        .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(160,32,240,0.8); }

        /* Контейнер главного экрана */
        .hero-container {
            max-width: 1400px;
            padding: 12% 60px 0 60px;
            position: relative;
            z-index: 10;
        }
        .info-block { max-width: 540px; background: rgba(6, 6, 8, 0.45); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.03); backdrop-filter: blur(6px); }
        .info-block h2 { font-size: 3.5rem; margin-bottom: 20px; font-weight: 800; letter-spacing: 1px; }
        .info-block p { color: #cdcdde; line-height: 1.7; margin-bottom: 35px; font-size: 1.1rem; }
        .btn-group { display: flex; gap: 15px; }
        .btn-buy { background: #a020f0; color: #fff; padding: 14px 35px; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 1.05rem; box-shadow: 0 0 25px rgba(160,32,240,0.5); transition: 0.3s; }
        .btn-buy:hover { transform: translateY(-3px); box-shadow: 0 0 35px rgba(160,32,240,0.8); }
        .btn-more { background: rgba(255,255,255,0.03); color: #fff; padding: 14px 35px; border-radius: 10px; text-decoration: none; font-weight: 500; font-size: 1.05rem; border: 1px solid rgba(255,255,255,0.08); transition: 0.3s; backdrop-filter: blur(5px); }
        .btn-more:hover { background: rgba(255,255,255,0.08); transform: translateY(-2px); }

        /* Секция Преимуществ */
        .features-section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 60px;
        }
        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }
        .main-feat-box {
            grid-row: span 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .main-feat-box h3 { font-size: 3rem; font-weight: 800; line-height: 1.2; margin-bottom: 20px; background: linear-gradient(to right, #fff, #b5b5c3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .main-feat-box p { color: #8a8a9e; line-height: 1.6; font-size: 1.05rem; }
        
        .feat-card {
            background: #111116;
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 35px;
            transition: 0.3s;
        }
        .feat-card:hover {
            border-color: rgba(160, 32, 240, 0.4);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(160,32,240,0.1);
        }
        .feat-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .feat-title span { color: #a020f0; }
        .feat-desc { color: #8a8a9e; font-size: 0.95rem; line-height: 1.6; }

        /* Секция Видеообзора */
        .video-section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 60px 40px 60px;
        }
        .video-section h3 { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; }
        .video-section p { color: #8a8a9e; margin-bottom: 30px; font-size: 1.05rem; }
        
        .video-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #111116;
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Секция Статистики */
        .stats-grid {
            max-width: 1400px;
            margin: 40px auto 100px auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 0 60px;
        }
        .stat-card {
            background: #111116;
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 22px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .stat-icon { font-size: 1.8rem; background: rgba(160, 32, 240, 0.08); padding: 10px; border-radius: 10px; color: #a020f0; min-width: 50px; text-align: center; }
        .stat-info { display: flex; flex-direction: column; gap: 4px; }
        .stat-label { color: #8a8a9e; font-size: 0.85rem; font-weight: 600; }
        .stat-value { font-size: 1.3rem; font-weight: 700; color: #fff; letter-spacing: 0.5px; }

        /* Футер (Подвал сайта) */
        footer {
            background: #09090b;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding: 60px 40px 30px 40px;
        }
        .footer-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 40px;
            padding: 0 20px;
        }
        .footer-brand { font-size: 1.5rem; font-weight: 800; letter-spacing: 2px; color: #fff; text-align: center; width: 100%; margin-bottom: 20px; }
        .footer-col { display: flex; flex-direction: column; gap: 12px; min-width: 180px; }
        .footer-col.right { text-align: right; }
        .footer-col h4 { font-size: 0.9rem; font-weight: 700; text-transform: uppercase; color: #f4f4f5; letter-spacing: 0.5px; margin-bottom: 4px; }
        .footer-link { color: #a1a1aa; text-decoration: none; font-size: 0.9rem; transition: 0.2s; }
        .footer-link:hover { color: #a020f0; }
        .footer-text { color: #71717a; font-size: 0.9rem; line-height: 1.5; }
        
        .copyright {
            width: 100%;
            text-align: center;
            color: #52525b;
            font-size: 0.85rem;
            margin-top: 50px;
            border-top: 1px solid rgba(255,255,255,0.02);
            padding-top: 25px;
        }

        /* Адаптивность под телефоны */
        @media (max-width: 1024px) {
            .features-grid { grid-template-columns: 1fr; }
            .main-feat-box { grid-row: auto; text-align: center; margin-bottom: 20px; }
            .hero-container { padding-top: 25%; text-align: center; }
            .info-block { margin: 0 auto; }
            .btn-group { justify-content: center; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            header, .features-section, .video-section, .stats-grid { padding-left: 20px; padding-right: 20px; }
        }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .footer-container { flex-direction: column; text-align: center; align-items: center; }
            .footer-col.right { text-align: center; }
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <!-- Шапка сайта -->
        <header>
            <div class="logo">SPECTER <span>1.16.5</span></div>
            <div class="nav-right">
                <a href="#" class="nav-link">Русский ▾</a>
                <a href="https://t.me" target="_blank" class="nav-link">Поддержка</a>
                <a href="#features" class="nav-link">Преимущества</a>
                <a href="#" class="btn-auth">Авторизация</a>
            </div>
        </header>

        <!-- Главный блок -->
        <div class="hero-container">
            <div class="info-block">
                <h2>О нас</h2>
