<!DOCTYPE html>
<html lang="ru">
<head>

    <title>SpecterClient | Minecraft Cheat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #08080c; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; position: relative; }
        body::before { content: ''; position: absolute; width: 300px; height: 300px; background: rgba(138, 43, 226, 0.2); filter: blur(100px); top: 10%; left: 15%; }
        body::after { content: ''; position: absolute; width: 300px; height: 300px; background: rgba(0, 191, 255, 0.15); filter: blur(100px); bottom: 10%; right: 15%; }

        h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: 2px; background: linear-gradient(45deg, #a020f0, #00bfff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; filter: drop-shadow(0 0 15px rgba(160,32,240,0.5)); }
        p { color: #8a8a98; font-size: 1.1rem; margin-bottom: 35px; line-height: 1.6; }
        .features { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 35px; text-align: left; }
        .feat-item { background: rgba(255,255,255,0.02); padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.03); font-size: 0.95rem; color: #cdcdde; }
        .feat-item span { color: #00bfff; margin-right: 5px; }
        .btn { display: inline-block; width: 100%; padding: 16px; background: linear-gradient(90deg, #a020f0, #00bfff); color: #fff; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; box-shadow: 0 0 25px rgba(160,32,240,0.4); transition: 0.3s ease; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 0 35px rgba(0,191,255,0.6); }
    </style>
</head>

    <div class="container">
